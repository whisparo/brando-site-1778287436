<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملابس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/3.2.4/css/tailwind.min.css">
    <style>
        /* Custom styles */
        .dark-glass {
            background-color: rgba(25, 25, 25, 0.5);
            backdrop-filter: blur(20px);
            padding: 10px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            margin: 10px;
        }
        .logo img {
            width: 30px;
            height: 30px;
            margin-bottom: 5px;
        }
        .glow {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        @media (max-width: 768px) {
            .hero-text {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Sticky Navbar -->
    <nav class="bg-transparent dark-glass sticky top-0 z-10">
        <div class="container mx-auto p-4 flex justify-between items-center">
            <a href="#" class="logo">
                <img src="https://source.unsplash.com/featured/?brand" alt="ملابس">
                ملابس
            </a>
            <ul class="flex items-center space-x-4">
                <li><a href="#" class="text-gray-400 hover:text-white">خدمات</a></li>
                <li><a href="#" class="text-gray-400 hover:text-white">تواصل معنا</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero h-screen bg-cover bg-center" style="background-image: url('https://source.unsplash.com/featured/?ملابس')">
        <div class="container mx-auto p-4 relative">
            <div class="hero-text text-3xl font-bold text-center text-white">
                <h1 class="font-bold">ملابس فاخرة</h1>
                <h2 class="mb-4">اكتشف أروع ملابسك الفاخرة</h2>
                <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg glow">ابدأ الآن</button>
            </div>
        </div>
    </section>

    <!-- Services Grid -->
    <section class="services py-12">
        <div class="container mx-auto p-4">
            <h2 class="text-3xl font-bold text-center mb-8">خدماتنا</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <div class="card dark-glass hover:scale-105 transition-all duration-300">
                    <img src="https://source.unsplash.com/featured/? ملابس رياضية" alt="خدمات" class="w-full h-40 object-cover object-center mb-4">
                    <h3 class="text-2xl font-bold mb-2">ملابس رياضية</h3>
                    <p class="text-gray-400">اكتشف أفضل ملابسك لنشاطك الرياضي</p>
                </div>
                <div class="card dark-glass hover:scale-105 transition-all duration-300">
                    <img src="https://source.unsplash.com/featured/? ملابس حكمية" alt="خدمات" class="w-full h-40 object-cover object-center mb-4">
                    <h3 class="text-2xl font-bold mb-2">ملابس حكمية</h3>
                    <p class="text-gray-400">اكتشف أفضل ملابسك للحكمية</p>
                </div>
                <div class="card dark-glass hover:scale-105 transition-all duration-300">
                    <img src="https://source.unsplash.com/featured/? ملابس نسائية" alt="خدمات" class="w-full h-40 object-cover object-center mb-4">
                    <h3 class="text-2xl font-bold mb-2">ملابس نسائية</h3>
                    <p class="text-gray-400">اكتشف أفضل ملابسك النسائية</p>
                </div>
            </div>
        </div>
    </section>

    <!-- WhatsApp CTA -->
    <div class="fixed bottom-4 right-4 z-20">
        <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">
            <i class="fas fa-whatsapp text-lg"></i> تواصل معنا
        </button>
    </div>

    <!-- Contact Section -->
    <section class="contact py-12">
        <div class="container mx-auto p-4">
            <h2 class="text-3xl font-bold text-center mb-8">تواصل معنا</h2>
            <form>
                <div class="mb-4">
                    <input type="text" class="block w-full p-2 bg-gray-100 border-gray-300 rounded-lg" placeholder="إسمك">
                </div>
                <div class="mb-4">
                    <input type="email" class="block w-full p-2 bg-gray-100 border-gray-300 rounded-lg" placeholder="بريدك الإلكتروني">
                </div>
                <div class="mb-4">
                    <textarea class="block w-full p-2 bg-gray-100 border-gray-300 rounded-lg" placeholder="رسالتك"></textarea>
                </div>
                <button class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">أرسل الرسالة</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 py-12 dark-glass sticky bottom-0 z-10">
        <div class="container mx-auto p-4 text-center">
            <p class="text-gray-400">صُنع بذكاء بواسطة براندو</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/axios@0.21.1/dist/axios.min.js"></script>
    <script>
        // WhatsApp CTA script
        var whatsapp = document.querySelector('.js-whatsapp');
        if (whatsapp) {
            whatsapp.addEventListener('click', function () {
                window.location.href = 'https://api.whatsapp.com/send?phone=+1xxxxxxxxxx';
            });
        }
    </script>
</body>
</html>
